/* ========== 全域重置 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:#f7f7f5;
  color:#2c2c2c;
  line-height:1.6;
  -webkit-font-smoothing:antialiased
}

/* ========== 品牌色調 ========== */
:root{
  --brand:#70BF45;
  --brand-dark:#10A83B;
  --brand-deep:#008a2e;
  --accent:#FF7761;
  --brown:#947054;
  --bg:#f7f7f5;
  --card-bg:#ffffff;
  --text:#2c2c2c;
  --text-muted:#6b6b6b;
  --border:#e8e6e0;
  --green-soft:#f0f8ea;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --radius:12px;
}

/* ========== Header ========== */
.header{
  background:linear-gradient(135deg,#70BF45 0%,#10A83B 100%);
  color:#fff;
  padding:48px 24px 56px;
  text-align:center;
  position:relative;
  overflow:hidden
}
.header::after{
  content:'';
  position:absolute;
  inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events:none
}
.header-content{position:relative;z-index:1;max-width:680px;margin:0 auto}
.header-icon{width:56px;height:56px;margin:0 auto 16px;border-radius:12px;background:url('https://www.i-pass.com.tw/CKPackage/images/iPMicon.png') center/contain no-repeat #fff;box-shadow:0 2px 12px rgba(0,0,0,0.1)}
.header-back{position:absolute;top:20px;left:24px;color:#fff;text-decoration:none;font-size:14px;opacity:0.85;display:flex;align-items:center;gap:6px;transition:opacity 0.2s;z-index:2}
.header-back:hover{opacity:1}
.header-back .arrow{font-size:16px;line-height:1}
.header h1{font-size:32px;font-weight:800;letter-spacing:-0.02em;margin-bottom:8px}
.header p{font-size:16px;opacity:0.9;max-width:520px;margin:0 auto;line-height:1.5}

/* ========== Search ========== */
.search-wrap{max-width:860px;margin:-28px auto 0;padding:0 20px;position:relative;z-index:10}
.search-box{
  display:flex;align-items:center;
  background:#fff;border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  padding:4px 4px 4px 20px;
  border:1px solid var(--border)
}
.search-box:focus-within{border-color:var(--brand);box-shadow:0 4px 24px rgba(112,191,69,0.18)}
.search-box .icon{font-size:18px;opacity:0.4;margin-right:10px}
.search-box input{
  flex:1;border:none;outline:none;
  font-size:16px;padding:14px 0;
  background:transparent;color:var(--text)
}
.search-box input::placeholder{color:#b0b0a8}
.search-box .count{
  font-size:13px;color:var(--text-muted);
  background:var(--bg);padding:6px 14px;
  border-radius:20px;margin-right:4px;white-space:nowrap
}

/* ========== Container ========== */
.container{max-width:1100px;margin:0 auto;padding:0 20px}

/* ========== 分類導航 ========== */
.nav-bar{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:32px 20px 8px;max-width:1100px;
  margin:0 auto;scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch
}
.nav-bar::-webkit-scrollbar{display:none}
.nav-chip{
  flex-shrink:0;padding:8px 18px;
  border-radius:20px;border:1px solid var(--border);
  background:#fff;font-size:14px;color:var(--text-muted);
  cursor:pointer;transition:all 0.2s;
  white-space:nowrap;font-weight:500
}
.nav-chip:hover{border-color:var(--brand);color:var(--brand)}
.nav-chip.active{
  background:var(--brand);color:#fff;
  border-color:var(--brand)
}

/* ========== 統計條 ========== */
.stats{
  display:flex;gap:24px;padding:24px 0 8px;
  flex-wrap:wrap;align-items:center
}
.stat-item{font-size:14px;color:var(--text-muted)}
.stat-item strong{color:var(--brand-dark);font-size:18px;margin-right:2px}

/* ========== 分類區塊 ========== */
.section{margin-bottom:28px}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:2px solid var(--bg)
}
.section-header .emoji{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0
}
.section-header h2{font-size:20px;font-weight:700;color:var(--brown)}
.section-header .count-badge{
  margin-left:auto;
  background:var(--green-soft);color:var(--brand-dark);
  font-size:13px;padding:2px 12px;border-radius:12px;
  font-weight:600
}
.brand-accent .section-header h2{color:var(--brand-dark)}
.brand-accent .section-header .emoji{background:var(--green-soft)}

/* ========== 商家卡片 ========== */
.brand-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:8px
}
.brand-tag{
  display:flex;align-items:center;gap:8px;
  background:#fff;padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;color:var(--text);
  transition:all 0.15s;
  cursor:default
}
.brand-tag:hover{
  border-color:var(--brand);
  box-shadow:0 2px 8px rgba(112,191,69,0.1);
  transform:translateY(-1px)
}
.brand-tag.has-link{cursor:pointer}
.brand-tag.has-link:hover .brand-name{color:var(--brand-dark);text-decoration:underline}
.brand-tag a{color:inherit;text-decoration:none;display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap}
.brand-tag .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--brand);flex-shrink:0;
  opacity:0.5
}
.brand-tag .brand-name{font-weight:500}
.brand-tag .brand-sub{
  font-size:12px;color:var(--text-muted);
  margin-left:auto;white-space:normal
}

/* ========== 大類別卡片（TWQR/超商等特殊大類） ========== */
.hero-card{
  background:linear-gradient(135deg,var(--green-soft) 0%,#fff 100%);
  border:1px solid rgba(112,191,69,0.2);
  border-radius:var(--radius);
  padding:20px 24px;
  margin-bottom:24px;
  display:flex;flex-wrap:wrap;align-items:center;gap:12px 20px;
  box-shadow:var(--shadow)
}
.hero-card .hc-icon{
  width:56px;height:56px;border-radius:12px;
  background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden
}
.hero-card h3{font-size:16px;font-weight:700;color:var(--brand-dark)}
.hero-card p{
  font-size:14px;color:var(--text-muted);
  flex:1;min-width:200px;line-height:1.5
}
.hero-card .tagline{
  font-size:13px;font-weight:600;
  color:var(--brand-dark);
  background:rgba(112,191,69,0.1);
  padding:4px 14px;border-radius:20px;
  white-space:nowrap
}

/* ========== 註腳 ========== */
.footer-note{
  text-align:center;padding:48px 20px 40px;
  color:var(--text-muted);font-size:14px
}
.footer-note .brand-icon{
  display:inline-block;
  width:40px;height:40px;
  border-radius:8px;
  background:url('https://www.i-pass.com.tw/CKPackage/images/iPMicon.png') center/contain no-repeat #fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  margin-bottom:12px
}
.footer-note p{max-width:480px;margin:0 auto;line-height:1.6}

/* ========== 隱藏控制 ========== */
.hidden{display:none !important}

/* ========== 回到頂部 ========== */
.back-top{
  position:fixed;bottom:32px;right:32px;
  width:44px;height:44px;border-radius:50%;
  background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 4px 16px rgba(112,191,69,0.3);
  cursor:pointer;opacity:0;visibility:hidden;
  transition:all 0.3s;border:none;z-index:100
}
.back-top.show{opacity:1;visibility:visible}
.back-top:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(112,191,69,0.4)}
.back-top:active{transform:translateY(-1px)}

/* ========== Responsive ========== */
@media(max-width:640px){
  .header{padding:36px 20px 48px}
  .header h1{font-size:26px}
  .search-wrap{margin-top:-24px}
  .brand-grid{grid-template-columns:1fr}
  .brand-tag{flex-wrap:wrap;gap:4px 6px}
  .brand-tag a{flex-wrap:wrap;gap:4px 6px}
  .brand-tag .brand-sub{margin-left:auto;white-space:normal;font-size:11px;color:#888;line-height:1.3}
  .stats{padding:16px 0 4px;gap:16px}
  .hero-card{padding:16px}
  .hero-card .tagline{white-space:normal}
  .nav-chip{padding:6px 14px;font-size:13px}
  .nav-bar{overflow-x:auto;flex-wrap:nowrap}
  .back-top{bottom:20px;right:20px;width:40px;height:40px}
}

  { id:'other', title:'其他',        emoji:'📌', color:'#f0f8ea', brands:[
    { name:'小林眼鏡', url:'https://www.kobayashi.com.tw' },
    { name:'i郵箱', url:'https://www.post.gov.tw' },
    { name:'in89豪華影城', url:'https://www.in89.com.tw' }
  ]}
];

// ========== Render helpers ==========
function renderBrand(b){
  const hasUrl = b.url && b.url !== '';
  if(typeof b === 'string'){
    return `<div class="brand-tag"><span class="dot"></span><span class="brand-name">${b}</span></div>`;
  }
  if(hasUrl){
    return `<div class="brand-tag has-link"><a href="${b.url}" target="_blank" rel="noopener"><span class="dot"></span><span class="brand-name">${b.name}</span>${b.sub ? `<span class="brand-sub">${b.sub}</span>` : ''}</a></div>`;
  }
  return `<div class="brand-tag">${b.sub
    ? `<span class="dot"></span><span class="brand-name">${b.name}</span><span class="brand-sub">${b.sub}</span>`
    : `<span class="dot"></span><span class="brand-name">${b.name}</span>`}</div>`;
}

function countBrands(cat){
  return cat.brands.reduce((a,b) => a + (typeof b === 'string' ? 1 : 1), 0);
}

function render(){
  const nav = document.getElementById('navBar');
  const sections = document.getElementById('categorySections');
  const stats = document.getElementById('statsBar');
  const total = CATEGORIES.reduce((a,c) => a + countBrands(c), 0);

  // Nav chips
  nav.innerHTML = `<div class="nav-chip active" data-cat="all">全部</div>` +
    CATEGORIES.map(c => `<div class="nav-chip" data-cat="${c.id}">${c.emoji} ${c.title}</div>`).join('');

  // Stats
  stats.innerHTML = `
    <div class="stat-item">📌 <strong>${CATEGORIES.length}</strong> 大分類</div>
    <div class="stat-item">🏷️ <strong>${total}</strong> 個品牌／通路</div>
    <div class="stat-item">💚 <strong>全台各地</strong> 皆可使用</div>
  `;

  // Sections
  sections.innerHTML = CATEGORIES.map(c => {
    const count = countBrands(c);
    return `
    <div class="section" data-category="${c.id}">
      <div class="section-header">
        <div class="emoji" style="background:${c.color}">${c.emoji}</div>
        <h2>${c.title}</h2>
        <span class="count-badge">${count} 家</span>
      </div>
      <div class="brand-grid">
        ${c.brands.map(renderBrand).join('')}
      </div>
    </div>`;
  }).join('');
}

// ========== Filter ==========
let activeCat = 'all';
let searchTerm = '';

function filter(){
  const q = searchTerm.toLowerCase().trim();
  const sections = document.querySelectorAll('.section');
  const heroCard = document.querySelector('.hero-card');
  let visibleCount = 0;

  sections.forEach(sec => {
    const cat = sec.dataset.category;
    const catMatch = activeCat === 'all' || activeCat === cat;
    if(!catMatch){ sec.classList.add('hidden'); return; }

    if(q === ''){
      sec.classList.remove('hidden');
      visibleCount++;
      return;
    }

    const text = sec.textContent.toLowerCase();
    if(text.includes(q)){
      sec.classList.remove('hidden');
      visibleCount++;
    } else {
      sec.classList.add('hidden');
    }
  });

  // Hero card: only show when filter is "all" or "twqr", and no search
  if(heroCard){
    const heroVisible = (activeCat === 'all' || activeCat === 'twqr') && q === '';
    heroCard.classList.toggle('hidden', !heroVisible);
  }

  updateCount(visibleCount);
}

function updateCount(visible){
  const total = CATEGORIES.reduce((a,c) => a + countBrands(c), 0);
  const el = document.getElementById('resultCount');
  if(searchTerm.trim() || activeCat !== 'all'){
    el.textContent = `找到 ${visible} 個分類`;
  } else {
    el.textContent = `${total} 個品牌`;
  }
}

// ========== Events ==========
document.getElementById('navBar').addEventListener('click', e => {
  const chip = e.target.closest('.nav-chip');
  if(!chip) return;
  document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  filter();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value;
  filter();
});

// Back to top button
window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
});

// ========== Init ==========
render();
filter();</script>
</body>
</html>
